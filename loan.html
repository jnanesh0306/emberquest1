
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Loan Approval</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background">
    <div class="card">
        <h1>💳 Digital Loan Approval</h1>

        <div class="input-box">
            <input type="text" id="name" required>
            <label>Full Name</label>
        </div>

        <div class="input-box">
            <input type="number" id="income" required>
            <label>Monthly Income (₹)</label>
        </div>

        <div class="input-box">
            <input type="number" id="loan" required>
            <label>Loan Amount (₹)</label>
        </div>

        <div class="input-box">
            <input type="number" id="cibil" required>
            <label>CIBIL Score</label>
        </div>

        <button onclick="checkLoan()">Check Status</button>

        <div id="result"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
